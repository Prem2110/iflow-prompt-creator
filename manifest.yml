---
applications:
  - name: orbit-prompt-creator
    memory: 512M
    disk_quota: 1G
    buildpacks:
      - python_buildpack
    command: uvicorn main:app --host 0.0.0.0 --port $PORT
    health-check-type: http
    health-check-http-endpoint: /health
    health-check-invocation-timeout: 60

    # Non-secret defaults — override with `cf set-env` as needed
    env:
      AICORE_DESTINATION_NAME: GENAICORE
      AICORE_RESOURCE_GROUP: default
      LLM_TIMEOUT: "120"
      LLM_USAGE_MONITOR_BASE_URL: https://llm-usage-monitor-egregious-armadillo-bt.cfapps.us10-001.hana.ondemand.com
      LLM_USAGE_MONITOR_APP_ID: "27"
      LLM_USAGE_MONITOR_MODEL_NAME: anthropic--claude-4.6-sonnet
      LLM_USAGE_MONITOR_CALL_TYPE_L_INVOKE: l_invoke
      LLM_USAGE_MONITOR_CALL_TYPE_A_INVOKE: a_invoke

    # Set secrets before deploying:
    #   cf set-env orbit-prompt-creator LLM_DEPLOYMENT_ID             <value>
    #   cf set-env orbit-prompt-creator LLM_USAGE_MONITOR_API_KEY     <value>
    #
    # CORS_ORIGINS is not required — the SPA is served from the same origin.

    services:
      - destination-service
